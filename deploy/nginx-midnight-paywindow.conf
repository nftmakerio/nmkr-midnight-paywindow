# /etc/nginx/sites-available/midnight-paywindow
#
# Two virtual hosts on the same machine. Each serves both the HTML page
# (express.static) and the /api/... routes from the same bridge process,
# so frontend and API share an origin (no CORS needed).
#
#   midnight-paywindow.preprod.nmkr.io  -> preprod bridge on :4100
#   midnight-paywindow.nmkr.io          -> mainnet bridge on :4101
#
# Obtain certs with certbot:
#   sudo certbot --nginx -d midnight-paywindow.preprod.nmkr.io \
#                        -d midnight-paywindow.nmkr.io
#
# Then symlink and reload:
#   sudo ln -s /etc/nginx/sites-available/midnight-paywindow \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# ---------- Preprod ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name midnight-paywindow.preprod.nmkr.io;

    ssl_certificate     /etc/letsencrypt/live/midnight-paywindow.preprod.nmkr.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/midnight-paywindow.preprod.nmkr.io/privkey.pem;

    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
    }
}

# ---------- Mainnet ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name midnight-paywindow.nmkr.io;

    ssl_certificate     /etc/letsencrypt/live/midnight-paywindow.nmkr.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/midnight-paywindow.nmkr.io/privkey.pem;

    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:4101;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
    }
}

# ---------- HTTP -> HTTPS redirect ----------
server {
    listen 80;
    listen [::]:80;
    server_name midnight-paywindow.preprod.nmkr.io
                midnight-paywindow.nmkr.io;
    return 301 https://$host$request_uri;
}
