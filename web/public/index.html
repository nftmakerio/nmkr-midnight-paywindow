<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NMKR Midnight Paywindow</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      color: #f7fdf9;
      background: linear-gradient(135deg, #0d4d2a 0%, #14b85f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .frame {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }
    .logo {
      width: 220px;
      max-width: 70%;
      margin-bottom: 2rem;
      filter: drop-shadow(0 4px 18px rgba(0,0,0,0.25));
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      opacity: 0.9;
      margin: 0 0 0.4rem 0;
      letter-spacing: 0.02em;
    }
    .price {
      font-size: 1.6rem;
      font-weight: 700;
      margin: 0 0 1.4rem 0;
      letter-spacing: 0.01em;
    }
    .price:empty { display: none; }
    .btn {
      background: #ffffff;
      color: #0d4d2a;
      border: none;
      padding: 0.95rem 2.5rem;
      font-size: 1.05rem;
      font-weight: 600;
      border-radius: 999px;
      cursor: pointer;
      transition: transform .08s ease, box-shadow .15s ease, opacity .15s ease;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }
    .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 10px 22px rgba(0,0,0,0.28); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn.secondary {
      background: transparent;
      color: #f7fdf9;
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow: none;
    }
    .status {
      margin-top: 1rem;
      font-size: 0.9rem;
      opacity: 0.85;
      min-height: 1.2em;
    }
    .status.error {
      color: #fff;
      background: rgba(180, 30, 30, 0.55);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 10px;
      padding: 0.65rem 0.9rem;
      margin-top: 1rem;
      text-align: left;
      font-size: 0.85rem;
      opacity: 1;
      word-break: break-word;
      white-space: pre-wrap;
      font-family: ui-monospace, SF Mono, Menlo, monospace;
      max-height: 240px;
      overflow-y: auto;
    }
    .reveal {
      margin-top: 1.5rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .6s ease, transform .6s ease;
      pointer-events: none;
    }
    .reveal.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .reveal-card {
      background: rgba(255,255,255,0.97);
      color: #1a1a1a;
      border-radius: 16px;
      padding: 1.25rem;
      text-align: left;
      box-shadow: 0 18px 48px rgba(0,0,0,0.25);
    }
    .reveal-card img {
      width: 100%;
      max-height: 280px;
      object-fit: contain;
      border-radius: 10px;
      background: #f1f5f1;
      margin-bottom: 1rem;
    }
    .reveal-card h2 { margin: 0 0 .25rem 0; font-size: 1.2rem; }
    .reveal-card .sub { font-size: .85rem; color: #666; margin-bottom: .75rem; word-break: break-all; }
    .reveal-card .desc { font-size: .9rem; color: #333; margin: .75rem 0; line-height: 1.45; }
    .reveal-card .meta-link {
      display: inline-block;
      margin-top: .5rem;
      color: #0d4d2a;
      font-weight: 600;
      text-decoration: none;
      font-size: .9rem;
      word-break: break-all;
    }
    .reveal-card .meta-link:hover { text-decoration: underline; }

    /* Mint timeline — vertical list of steps with a connector line. */
    .timeline {
      display: none;
      text-align: left;
      margin: 1.5rem auto 0;
      max-width: 360px;
      padding: 0.25rem 0;
    }
    .timeline.show { display: block; }
    .timeline-step {
      position: relative;
      padding: 0.55rem 0 0.55rem 2.25rem;
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.55);
      transition: color .25s ease;
    }
    .timeline-step::before {
      /* the connector line — continuous through the whole list */
      content: '';
      position: absolute;
      left: 0.65rem;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(255, 255, 255, 0.25);
    }
    .timeline-step:first-child::before { top: 0.6rem; }
    .timeline-step:last-child::before  { bottom: calc(100% - 0.6rem); }
    .timeline-step .dot {
      position: absolute;
      left: 0;
      top: 0.55rem;
      width: 1.35rem;
      height: 1.35rem;
      border-radius: 999px;
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.45);
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: #0d4d2a;
      transition: background .25s ease, border-color .25s ease, transform .25s ease, box-shadow .25s ease;
    }
    .timeline-step .sub {
      font-size: 0.78rem;
      opacity: 0.7;
      margin-top: 0.1rem;
      min-height: 0;
    }
    /* States */
    .timeline-step.active {
      color: #fff;
      font-weight: 600;
    }
    .timeline-step.active .dot {
      border-color: #fff;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.18);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.18); }
      50%      { box-shadow: 0 0 0 9px rgba(255, 255, 255, 0.08); }
    }
    .timeline-step.done {
      color: rgba(255, 255, 255, 0.95);
    }
    .timeline-step.done .dot {
      border-color: #b9f1cf;
      background: #b9f1cf;
    }
    .timeline-step.done .dot::after { content: '✓'; font-weight: 700; }
    .timeline-step.failed {
      color: #ffd5d5;
    }
    .timeline-step.failed .dot {
      border-color: #ffd5d5;
      background: #c64242;
      color: #fff;
    }
    .timeline-step.failed .dot::after { content: '✕'; font-weight: 700; }
    .timeline-step.skipped {
      opacity: 0.5;
      text-decoration: line-through;
    }

    .footer {
      margin-top: 1.5rem;
      font-size: .75rem;
      opacity: 0.65;
    }
    code { font-family: ui-monospace, SF Mono, Menlo, monospace; }
  </style>
</head>
<body>
  <div class="frame">
    <img class="logo" src="https://studio.nmkr.io/images/nmkr-studio-logo.svg" alt="NMKR" />
    <h1 id="title">Mint NFT on Midnight</h1>
    <div id="price" class="price"></div>

    <button id="mintBtn" class="btn" disabled>Mint NFT</button>
    <div id="status" class="status">Loading…</div>

    <div id="timeline" class="timeline" aria-hidden="true">
      <div class="timeline-step" data-step="start">
        <div class="dot"></div>
        <div>Start mint</div>
        <div class="sub" data-sub></div>
      </div>
      <div class="timeline-step" data-step="night">
        <div class="dot"></div>
        <div>Send NIGHT transaction</div>
        <div class="sub" data-sub></div>
      </div>
      <div class="timeline-step" data-step="confirm">
        <div class="dot"></div>
        <div>Confirm NIGHT on-chain</div>
        <div class="sub" data-sub></div>
      </div>
      <div class="timeline-step" data-step="mint">
        <div class="dot"></div>
        <div>Build &amp; submit mint transaction</div>
        <div class="sub" data-sub></div>
      </div>
      <div class="timeline-step" data-step="done">
        <div class="dot"></div>
        <div>Finished</div>
        <div class="sub" data-sub></div>
      </div>
    </div>

    <div id="reveal" class="reveal">
      <div class="reveal-card">
        <img id="nftImage" alt="">
        <h2 id="nftName"></h2>
        <div class="sub">Token #<span id="nftTokenId"></span> · <code id="nftContract"></code></div>
        <p id="nftDesc" class="desc"></p>
        <a id="nftUri" class="meta-link" href="#" target="_blank" rel="noopener noreferrer">View full metadata →</a>
      </div>
    </div>

    <div class="footer">powered by NMKR · Midnight Network</div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
