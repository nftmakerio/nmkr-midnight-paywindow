<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NMKR Midnight Paywindow</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      color: #f7fdf9;
      background: linear-gradient(135deg, #0d4d2a 0%, #14b85f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .frame {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }
    .logo {
      width: 220px;
      max-width: 70%;
      margin-bottom: 2rem;
      filter: drop-shadow(0 4px 18px rgba(0,0,0,0.25));
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      opacity: 0.9;
      margin: 0 0 1.5rem 0;
      letter-spacing: 0.02em;
    }
    .btn {
      background: #ffffff;
      color: #0d4d2a;
      border: none;
      padding: 0.95rem 2.5rem;
      font-size: 1.05rem;
      font-weight: 600;
      border-radius: 999px;
      cursor: pointer;
      transition: transform .08s ease, box-shadow .15s ease, opacity .15s ease;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }
    .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 10px 22px rgba(0,0,0,0.28); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn.secondary {
      background: transparent;
      color: #f7fdf9;
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow: none;
    }
    .status {
      margin-top: 1rem;
      font-size: 0.9rem;
      opacity: 0.85;
      min-height: 1.2em;
    }
    .status.error {
      color: #fff;
      background: rgba(180, 30, 30, 0.55);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 10px;
      padding: 0.65rem 0.9rem;
      margin-top: 1rem;
      text-align: left;
      font-size: 0.85rem;
      opacity: 1;
      word-break: break-word;
    }
    .reveal {
      margin-top: 1.5rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .6s ease, transform .6s ease;
      pointer-events: none;
    }
    .reveal.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .reveal-card {
      background: rgba(255,255,255,0.97);
      color: #1a1a1a;
      border-radius: 16px;
      padding: 1.25rem;
      text-align: left;
      box-shadow: 0 18px 48px rgba(0,0,0,0.25);
    }
    .reveal-card img {
      width: 100%;
      max-height: 280px;
      object-fit: contain;
      border-radius: 10px;
      background: #f1f5f1;
      margin-bottom: 1rem;
    }
    .reveal-card h2 { margin: 0 0 .25rem 0; font-size: 1.2rem; }
    .reveal-card .sub { font-size: .85rem; color: #666; margin-bottom: .75rem; word-break: break-all; }
    .meta {
      margin-top: 1rem;
      background: #f3f7f4;
      border-radius: 10px;
      padding: .9rem;
      font-family: ui-monospace, SF Mono, Menlo, monospace;
      font-size: .8rem;
      color: #1f3a2a;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
    }
    .meta.show { display: block; }
    .footer {
      margin-top: 1.5rem;
      font-size: .75rem;
      opacity: 0.65;
    }
    code { font-family: ui-monospace, SF Mono, Menlo, monospace; }
  </style>
</head>
<body>
  <div class="frame">
    <img class="logo" src="https://studio.nmkr.io/images/nmkr-studio-logo.svg" alt="NMKR" />
    <h1 id="title">Mint NFT on Midnight</h1>

    <button id="mintBtn" class="btn" disabled>Mint NFT</button>
    <div id="status" class="status">Loading…</div>

    <div id="reveal" class="reveal">
      <div class="reveal-card">
        <img id="nftImage" alt="">
        <h2 id="nftName"></h2>
        <div class="sub">Token #<span id="nftTokenId"></span> · <code id="nftContract"></code></div>
        <button id="showMetaBtn" class="btn secondary" style="color:#0d4d2a; border-color:#0d4d2a;">Show metadata</button>
        <pre id="nftMeta" class="meta"></pre>
      </div>
    </div>

    <div class="footer">powered by NMKR · Midnight Network</div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
